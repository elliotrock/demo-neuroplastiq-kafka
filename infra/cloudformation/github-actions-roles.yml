  GithubActionsDeployProdRole:
    Type: AWS::IAM::Role
    Condition: DoProd
    Properties:
      RoleName: github-actions-deploy-prod
      Description: CI/CD for github prod
      MaxSessionDuration: 28800
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Ref ProdAllowedSubClaims
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
      Policies:
        - PolicyName: Bookibet-Prod-EKS-DeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: UseEksctlNodegroupLaunchTemplate
                Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:GetLaunchTemplateData
                  - ec2:RunInstances
                Resource: arn:aws:ec2:ap-southeast-2:838869291259:launch-template/*
              - Sid: ManageNodegroupASG
                Effect: Allow
                Action:
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                Resource: '*'
              - Sid: IAMRoleManagementEksctl
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:UpdateAssumeRolePolicy
                Resource: arn:aws:iam::*:role/eksctl-*
              - Sid: EKSAccessEntryEksctl
                Effect: Allow
                Action:
                  - eks:CreateAccessEntry
                  - eks:DeleteAccessEntry
                  - eks:DescribeAccessEntry
                  - eks:ListAccessEntries
                  - eks:ListAssociatedAccessPolicies
                Resource:
                  - arn:aws:eks:ap-southeast-2:*:cluster/bookibet-prod
                  - arn:aws:eks:ap-southeast-2:*:access-entry/bookibet-prod/*
              - Sid: InstanceProfileManagementEksctl
                Effect: Allow
                Action:
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                  - iam:ListInstanceProfilesForRole
                Resource: arn:aws:iam::*:instance-profile/eksctl-bookibet-prod-nodegroup-*
              - Sid: PassRoleEksctl
                Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws:iam::*:role/eksctl-*
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - eks.amazonaws.com
                      - ec2.amazonaws.com
              - Sid: IAMRoleManagementEbsCsi
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:UpdateAssumeRolePolicy
                Resource: arn:aws:iam::*:role/AmazonEKS_EBS_CSI_DriverRole-*
              - Sid: PassRoleEbsCsi
                Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws:iam::*:role/AmazonEKS_EBS_CSI_DriverRole-*
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - eks.amazonaws.com
                      - ec2.amazonaws.com
              - Sid: EKSClusterManagement
                Effect: Allow
                Action:
                  - eks:CreateCluster
                  - eks:DeleteCluster
                  - eks:UpdateClusterVersion
                  - eks:UpdateClusterConfig
                  - eks:DescribeCluster
                  - eks:DescribeClusterVersions
                  - eks:ListClusters
                  - eks:TagResource
                  - eks:UntagResource
                  - eks:DescribeUpdate
                  - eks:ListUpdates
