AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions deploy roles for bookibet-platform (dev/staging/prod).

Parameters:
  RepoOwner:
    Type: String
    Default: The-Booki-Group
    Description: GitHub org or user that owns the repo.
  RepoName:
    Type: String
    Default: bookibet-platform
    Description: GitHub repository name.
  OidcProviderArn:
    Type: String
    Description: ARN of the GitHub Actions OIDC provider in this AWS account.
  CreateDevRole:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Create github-actions-deploy-dev (set true if importing or recreating).
  CreateStagingRole:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
  CreateProdRole:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
  DevAllowedSubClaims:
    Type: CommaDelimitedList
    Default: repo:The-Booki-Group/bookibet-platform:environment:dev,repo:The-Booki-Group/bookibet-platform:ref:refs/heads/dev,repo:The-Booki-Group/bookibet-platform:ref:refs/heads/main
    Description: Allowed GitHub OIDC subject claims for dev role.
  StagingAllowedSubClaims:
    Type: CommaDelimitedList
    Default: repo:The-Booki-Group/bookibet-platform:environment:staging
    Description: Allowed GitHub OIDC subject claims for staging role.
  ProdAllowedSubClaims:
    Type: CommaDelimitedList
    Default: repo:The-Booki-Group/bookibet-platform:environment:prod
    Description: Allowed GitHub OIDC subject claims for prod role.

Conditions:
  DoDev: !Equals [!Ref CreateDevRole, 'true']
  DoStaging: !Equals [!Ref CreateStagingRole, 'true']
  DoProd: !Equals [!Ref CreateProdRole, 'true']

Resources:
  GithubActionsDeployDevRole:
    Type: AWS::IAM::Role
    Condition: DoDev
    Properties:
      RoleName: github-actions-deploy-dev
      Description: CI/CD for github dev
      MaxSessionDuration: 28800
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Ref DevAllowedSubClaims
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
      Policies:
        - PolicyName: Bookibet-Dev-EKS-DeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: UseEksctlNodegroupLaunchTemplate
                Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:GetLaunchTemplateData
                  - ec2:RunInstances
                Resource: arn:aws:ec2:ap-southeast-2:838869291259:launch-template/*
              - Sid: ManageNodegroupASG
                Effect: Allow
                Action:
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                Resource: '*'
              - Sid: IAMRoleManagementEksctl
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:UpdateAssumeRolePolicy
                Resource: arn:aws:iam::*:role/eksctl-*
              - Sid: EKSAccessEntryEksctl
                Effect: Allow
                Action:
                  - eks:CreateAccessEntry
                  - eks:DeleteAccessEntry
                  - eks:DescribeAccessEntry
                  - eks:ListAccessEntries
                  - eks:ListAssociatedAccessPolicies
                Resource:
                  - arn:aws:eks:ap-southeast-2:*:cluster/bookibet-dev
                  - arn:aws:eks:ap-southeast-2:*:access-entry/bookibet-dev/*
              - Sid: InstanceProfileManagementEksctl
                Effect: Allow
                Action:
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                  - iam:ListInstanceProfilesForRole
                Resource: arn:aws:iam::*:instance-profile/eksctl-bookibet-dev-nodegroup-*
              - Sid: PassRoleEksctl
                Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws:iam::*:role/eksctl-*
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - eks.amazonaws.com
                      - ec2.amazonaws.com
              - Sid: IAMRoleManagementEbsCsi
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:UpdateAssumeRolePolicy
                Resource: arn:aws:iam::*:role/AmazonEKS_EBS_CSI_DriverRole-*
              - Sid: PassRoleEbsCsi
                Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws:iam::*:role/AmazonEKS_EBS_CSI_DriverRole-*
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - eks.amazonaws.com
                      - ec2.amazonaws.com
              - Sid: EKSClusterManagement
                Effect: Allow
                Action:
                  - eks:CreateCluster
                  - eks:DeleteCluster
                  - eks:UpdateClusterVersion
                  - eks:UpdateClusterConfig
                  - eks:DescribeCluster
                  - eks:DescribeClusterVersions
                  - eks:ListClusters
                  - eks:TagResource
                  - eks:UntagResource
                  - eks:DescribeUpdate
                  - eks:ListUpdates
                Resource: '*'
              - Sid: EKSNodegroupManagement
                Effect: Allow
                Action:
                  - eks:CreateNodegroup
                  - eks:UpdateNodegroupConfig
                  - eks:UpdateNodegroupVersion
                  - eks:DeleteNodegroup
                  - eks:DescribeNodegroup
                  - eks:ListNodegroups
                Resource: '*'
              - Sid: EKSAddonManagement
                Effect: Allow
                Action:
                  - eks:CreateAddon
                  - eks:UpdateAddon
                  - eks:DeleteAddon
                  - eks:DescribeAddon
                  - eks:ListAddons
                  - eks:DescribeAddonVersions
                  - eks:DescribeAddonConfiguration
                Resource: '*'
              - Sid: EcrRepositoryManagement
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DescribeRepositories
                  - ecr:TagResource
                Resource: '*'
              - Sid: CloudFormationEKSStacks
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:DeleteStack
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:TagResource
                  - cloudformation:UpdateTerminationProtection
                Resource: '*'
              - Sid: KmsKeyManagement
                Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:TagResource
                  - kms:UntagResource
                  - kms:DescribeKey
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:ScheduleKeyDeletion
                Resource: '*'
              - Sid: EC2NetworkingFull
                Effect: Allow
                Action:
                  - ec2:DescribeAddresses
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeInstanceTypeOfferings
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeNatGateways
                  - ec2:DescribeRouteTables
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeTags
                  - ec2:DescribeVpc*
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:CreateNatGateway
                  - ec2:DeleteNatGateway
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:DeleteLaunchTemplate
                  - ec2:DeleteLaunchTemplateVersions
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:GetLaunchTemplateData
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:DescribeVpcEndpoints
                  - ec2:ModifyVpcEndpoint
                Resource: '*'
              - Sid: RunInstancesWithEksctlLaunchTemplates
                Effect: Allow
                Action: ec2:RunInstances
                Resource:
                  - arn:aws:ec2:ap-southeast-2:838869291259:launch-template/*
                  - arn:aws:ec2:ap-southeast-2:*:instance/*
                  - arn:aws:ec2:ap-southeast-2:*:image/*
                  - arn:aws:ec2:ap-southeast-2:*:security-group/*
                  - arn:aws:ec2:ap-southeast-2:*:subnet/*
