                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:TagRole
                  - iam:GetRole
                  - iam:CreateServiceLinkedRole
                  - iam:ListAttachedRolePolicies
                Resource:
                  - arn:aws:iam::*:role/Bookibet*
                  - arn:aws:iam::*:role/cfk-*
                  - arn:aws:iam::*:role/kafka-*
                  - arn:aws:iam::*:role/connect-*
                  - arn:aws:iam::*:role/schema-registry-*
              - Sid: IAMOIDCProvider
                Effect: Allow
                Action:
                  - iam:CreateOpenIDConnectProvider
                  - iam:GetOpenIDConnectProvider
                  - iam:TagOpenIDConnectProvider
                Resource: '*'
              - Sid: CreateServiceLinkedRolesForEKSAndASG
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - eks.amazonaws.com
                      - eks-nodegroup.amazonaws.com
                      - autoscaling.amazonaws.com
                      - spot.amazonaws.com
                      - spotfleet.amazonaws.com
                      - ebs.amazonaws.com
              - Sid: PassRoleRestrictedToEKS
                Effect: Allow
                Action: iam:PassRole
