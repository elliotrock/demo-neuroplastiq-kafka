                  - eks:CreateNodegroup
                  - eks:UpdateNodegroupConfig
                  - eks:UpdateNodegroupVersion
                  - eks:DeleteNodegroup
                  - eks:DescribeNodegroup
                  - eks:ListNodegroups
                Resource: '*'
              - Sid: EKSAddonManagement
