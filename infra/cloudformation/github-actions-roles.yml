                  - ec2:DeleteLaunchTemplate
                  - ec2:DeleteLaunchTemplateVersions
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:GetLaunchTemplateData
                Resource: '*'
              - Sid: RunInstancesWithEksctlLaunchTemplates
                Effect: Allow
                Action: ec2:RunInstances
                Resource:
                  - arn:aws:ec2:ap-southeast-2:838869291259:launch-template/*
                  - arn:aws:ec2:ap-southeast-2:*:instance/*
                  - arn:aws:ec2:ap-southeast-2:*:image/*
