                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                Resource: arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
        - PolicyName: passrole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: '*'

