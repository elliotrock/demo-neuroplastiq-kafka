{{- if and .Values.kafkaRestProxy.enabled .Values.kafkaRestProxyLoadBalancer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-rest-internal
  namespace: {{.Values.namespace}}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    {{- with .Values.kafkaRestProxyLoadBalancer.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  selector:
    {{- toYaml .Values.kafkaRestProxyLoadBalancer.selector | nindent 4 }}
{{- end }}
