apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroplastiq-graphql-worker-0
  namespace: neuroplastiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuroplastiq-graphql-worker
      shard: "0"
  template:
    metadata:
      labels:
        app: neuroplastiq-graphql-worker
        shard: "0"
    spec:
      containers:
        - name: neuroplastiq
          image: 755267562381.dkr.ecr.ap-southeast-2.amazonaws.com/neuro-staging-neuroplastiq:staging-c7a79f5m
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SCHEMA_REGISTRY_URL
              value: "http://schemaregistry.confluent.svc.cluster.local:8081"
            - name: DOMAIN
              value: "npf"
            - name: LOG_LEVEL
              value: "info"
            # Phase 1 shard identity (read by graphql-source connector once implemented)
            - name: WORKER_COUNT
              value: "3"
            - name: WORKER_ID
              value: "0"
            - name: SHARDING_MODE
              value: "hash_mod"
          envFrom:
            - secretRef:
                name: neuroplastiq-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: neuroplastiq-graphql-worker-0
  namespace: neuroplastiq
spec:
  selector:
    app: neuroplastiq-graphql-worker
    shard: "0"
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
