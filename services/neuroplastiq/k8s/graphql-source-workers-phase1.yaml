apiVersion: batch/v1
kind: CronJob
metadata:
  name: neuroplastiq-graphql-worker-0-trigger
  namespace: neuroplastiq
spec:
  # Every minute; tune to control pressure/throughput
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: trigger
              image: curlimages/curl:8.11.1
              args:
                - -sS
                - -X
                - POST
                - --max-time
                - "900"
                - http://neuroplastiq-graphql-worker-0.neuroplastiq.svc.cluster.local:8000/connector
---
